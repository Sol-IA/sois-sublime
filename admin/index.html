<style>
/* Admin specific */
.admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: var(--space-sm); margin-bottom: var(--space-lg); }
.stat-card { background: var(--color-white); border-radius: var(--radius-md); padding: var(--space-md); text-align: center; border: 1px solid var(--color-border-light); }
.stat-card__number { font-family: var(--font-heading); font-size: var(--text-3xl); color: var(--color-primary); line-height: 1; }
.stat-card__label { font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

.client-table { width: 100%; border-collapse: collapse; }
.client-table th { font-family: var(--font-heading); font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-muted); text-align: left; padding: var(--space-sm); border-bottom: 2px solid var(--color-border); }
.client-table td { padding: var(--space-sm); border-bottom: 1px solid var(--color-border-light); font-size: var(--text-sm); vertical-align: middle; }
.client-table tr { cursor: pointer; transition: background var(--transition); }
.client-table tr:hover { background: var(--color-bg-warm); }

.badge { display: inline-block; font-size: var(--text-xs); padding: 3px 10px; border-radius: var(--radius-full); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.badge--active { background: #e8f5e9; color: #2e7d32; }
.badge--pending { background: #fff3e0; color: #e65100; }
.badge--expired { background: #fce4ec; color: #c62828; }

.detail-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: var(--space-sm); margin-bottom: var(--space-lg); }
.detail-header h2 { margin-bottom: 0; }
.detail-actions { display: flex; gap: var(--space-xs); flex-wrap: wrap; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-sm); margin-bottom: var(--space-lg); }
@media (max-width: 640px) { .detail-grid { grid-template-columns: 1fr; } }
.detail-item { font-size: var(--text-sm); }
.detail-item__label { font-weight: 600; color: var(--color-text-muted); font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.04em; }

.note-form { background: var(--color-white); border-radius: var(--radius-lg); padding: var(--space-lg); border: 1px solid var(--color-border-light); margin-bottom: var(--space-lg); }

.tracker-table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
.tracker-table th { font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.04em; color: var(--color-text-muted); text-align: left; padding: 8px; border-bottom: 2px solid var(--color-border); }
.tracker-table td { padding: 8px; border-bottom: 1px solid var(--color-border-light); }

.back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: var(--text-sm); color: var(--color-accent); cursor: pointer; margin-bottom: var(--space-md); background: none; border: none; font-family: inherit; }
.back-btn:hover { text-decoration: underline; }

@media (max-width: 768px) {
  .client-table th:nth-child(3), .client-table td:nth-child(3),
  .client-table th:nth-child(5), .client-table td:nth-child(5) { display: none; }
}
</style>

  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function downloadCSV(rows, filename) {
    var csv = rows.map(function(r) {
      return r.map(function(cell) {
        var v = String(cell == null ? '' : cell);
        if (v.indexOf(';') !== -1 || v.indexOf('"') !== -1 || v.indexOf('\n') !== -1) {
          v = '"' + v.replace(/"/g, '""') + '"';
        }
        return v;
      }).join(';');
    }).join('\n');
    var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast('Export ' + filename + ' téléchargé');

  function renderDashboard() {
    var today = new Date();
    var todayISO = today.toISOString().slice(0,10);
    var in7Days = new Date(today.getTime() + 7*86400000).toISOString().slice(0,10);

    // Compute actionable items

      if (cl.status !== 'active' || !cl.coachNotes || cl.coachNotes.length === 0) return false;
      var lastNote = cl.coachNotes[0].date;
      var daysSince = (today - new Date(lastNote)) / 86400000;
      return daysSince > 10;
    });
    var newLeads = state.leads.filter(function(l) {
      var daysSince = (today - new Date(l.date)) / 86400000;
      return daysSince <= 7;
    });
    var toCallLeads = state.leads.filter(function(l) { return !l.called; });

    var totalActions = endingSoon.length + pending.length + staleNotes.length + newLeads.length + toCallLeads.length;

    var h = '<div class="espace-content" style="padding-top:var(--space-md);">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--space-sm);margin-bottom:var(--space-lg);">';

    if (totalActions === 0) {
      h += '<div class="card" style="padding:var(--space-xl);text-align:center;">';
      h += '<div style="font-size:48px;margin-bottom:var(--space-sm);">&#x2728;</div>';
      h += '<h3 style="margin-bottom:var(--space-xs);">Tu es à jour !</h3>';
      h += '<p style="color:var(--color-text-muted);">Aucune action urgente aujourd\'hui. Profite de ce moment pour toi.</p>';
      h += '</div>';
    } else {
      // ── Nouvelles leads à rappeler ──
      if (newLeads.length > 0) {
        h += '<div class="card" style="margin-bottom:var(--space-md);padding:var(--space-md);border-left:4px solid #F13D52;">';
        h += '<h3 style="font-size:var(--text-base);margin-bottom:var(--space-sm);">&#x1F4E9; Nouvelles leads à contacter (' + newLeads.length + ')</h3>';
        newLeads.forEach(function(l) {
          h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-xs) 0;border-bottom:1px solid var(--color-border-light);gap:var(--space-sm);flex-wrap:wrap;">';
          h += '<div><strong>' + esc(l.prenom + ' ' + l.nom) + '</strong> <span style="font-size:var(--text-xs);color:var(--color-text-muted);">' + formatDate(l.date) + '</span></div>';
          h += '<div style="display:flex;gap:var(--space-xs);">';
          if (l.telephone) h += '<a href="https://wa.me/33' + l.telephone.replace(/\s/g,'').replace(/^0/,'') + '" target="_blank" class="btn btn--outline btn--sm" style="font-size:var(--text-xs);border-color:#25D366;color:#25D366;padding:3px 10px;">WhatsApp</a>';
          h += '<a href="mailto:' + esc(l.email) + '" class="btn btn--outline btn--sm" style="font-size:var(--text-xs);padding:3px 10px;">Email</a>';
          h += '</div></div>';
        });
        h += '<button class="btn btn--outline btn--sm" data-admin-tab="leads" style="margin-top:var(--space-sm);">Voir tous les leads &rarr;</button>';
        h += '</div>';
      }

      // ── Clientes à activer ──
      if (pending.length > 0) {
        h += '<div class="card" style="margin-bottom:var(--space-md);padding:var(--space-md);border-left:4px solid #e65100;">';
        h += '<h3 style="font-size:var(--text-base);margin-bottom:var(--space-sm);">&#x26A1; Clientes en attente d\'activation (' + pending.length + ')</h3>';
        pending.forEach(function(cl) {
          h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-xs) 0;border-bottom:1px solid var(--color-border-light);gap:var(--space-sm);flex-wrap:wrap;">';

        h += '<h3 style="font-size:var(--text-base);margin-bottom:var(--space-sm);">&#x23F0; Programmes se terminant dans 7 jours (' + endingSoon.length + ')</h3>';
        endingSoon.forEach(function(cl) {

      // ── Clientes sans suivi récent ──
      if (staleNotes.length > 0) {
        h += '<div class="card" style="margin-bottom:var(--space-md);padding:var(--space-md);border-left:4px solid #9A9A9A;">';
        h += '<h3 style="font-size:var(--text-base);margin-bottom:var(--space-sm);">&#x1F4AD; Clientes sans suivi récent (' + staleNotes.length + ')</h3>';
        h += '<p style="font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-sm);">Pas de compte-rendu depuis plus de 10 jours.</p>';
        staleNotes.forEach(function(cl) {
          var lastNoteDate = cl.coachNotes[0].date;
          h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-xs) 0;border-bottom:1px solid var(--color-border-light);gap:var(--space-sm);flex-wrap:wrap;">';

    h += '</div>';

  function renderList() {
    var all = state.clients;
    var active = all.filter(function(cl) { return cl.status === 'active'; }).length;
    var pending = all.filter(function(cl) { return cl.status === 'pending'; }).length;
    var expired = all.filter(function(cl) { return cl.status === 'expired'; }).length;

    // Apply filters
    var c = all.filter(function(cl) {
      if (state.filterStatus !== 'all' && cl.status !== state.filterStatus) return false;
      if (state.filterProgram !== 'all' && cl.program !== state.filterProgram) return false;
      if (state.search) {
        var q = state.search.toLowerCase();
        var match = (cl.firstName + ' ' + cl.lastName).toLowerCase().indexOf(q) !== -1 ||
                    cl.email.toLowerCase().indexOf(q) !== -1 ||
                    (cl.phone || '').indexOf(q) !== -1;
        if (!match) return false;
      }
      return true;
    });

    var h = '<div class="espace-content" style="padding-top:calc(var(--header-h) + var(--space-md));">';

    // Stats (cliquables comme filtres)
    h += '<div class="admin-stats">';
    h += '<div class="stat-card stat-filter" data-filter-status="all" style="cursor:pointer;' + (state.filterStatus === 'all' ? 'border-color:var(--color-primary);' : '') + '"><div class="stat-card__number">' + all.length + '</div><div class="stat-card__label">Total</div></div>';
    h += '<div class="stat-card stat-filter" data-filter-status="active" style="cursor:pointer;' + (state.filterStatus === 'active' ? 'border-color:#2e7d32;' : '') + '"><div class="stat-card__number" style="color:#2e7d32;">' + active + '</div><div class="stat-card__label">Actives</div></div>';
    h += '<div class="stat-card stat-filter" data-filter-status="pending" style="cursor:pointer;' + (state.filterStatus === 'pending' ? 'border-color:#e65100;' : '') + '"><div class="stat-card__number" style="color:#e65100;">' + pending + '</div><div class="stat-card__label">En attente</div></div>';
    h += '<div class="stat-card stat-filter" data-filter-status="expired" style="cursor:pointer;' + (state.filterStatus === 'expired' ? 'border-color:#c62828;' : '') + '"><div class="stat-card__number" style="color:#c62828;">' + expired + '</div><div class="stat-card__label">Expirées</div></div>';
    h += '</div>';

    // Search + programme filter
    h += '<div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-md);flex-wrap:wrap;align-items:center;">';
    h += '<input type="text" id="search-input" class="form__input" value="' + esc(state.search) + '" placeholder="Rechercher par nom, email, tel..." style="flex:1;min-width:200px;padding:8px 14px;font-size:var(--text-sm);">';
    h += '<button class="btn btn--outline btn--sm" id="export-clients-csv" style="white-space:nowrap;">&darr; Exporter CSV</button>';
    h += '<select id="filter-program" class="form__input" style="width:auto;padding:8px 14px;font-size:var(--text-sm);cursor:pointer;">';
    h += '<option value="all"' + (state.filterProgram === 'all' ? ' selected' : '') + '>Tous les programmes</option>';
    h += '<option value="reset21"' + (state.filterProgram === 'reset21' ? ' selected' : '') + '>Reset 21</option>';
    h += '<option value="evolution"' + (state.filterProgram === 'evolution' ? ' selected' : '') + '>Evolution</option>';
    h += '</select>';
    if (state.search || state.filterStatus !== 'all' || state.filterProgram !== 'all') {
      h += '<button class="btn btn--outline btn--sm" id="clear-filters-btn">Effacer les filtres</button>';
    }
    h += '</div>';

    // Results count
    if (c.length !== all.length) {
      h += '<p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-sm);">' + c.length + ' résultat' + (c.length > 1 ? 's' : '') + ' sur ' + all.length + '</p>';
    }

    // Table
    h += '<div style="overflow-x:auto;">';
    h += '<table class="client-table">';
    h += '<thead><tr><th>Nom</th><th>Programme</th><th>Email</th><th>Statut</th><th>Dates</th></tr></thead>';
    h += '<tbody>';
    if (c.length === 0) {
      h += '<tr><td colspan="5" style="text-align:center;color:var(--color-text-muted);padding:var(--space-xl);">Aucune cliente trouvée</td></tr>';
    }
    c.forEach(function(cl) {
      h += '<tr data-token="' + esc(cl.token || cl.email) + '">';
      h += '<td><strong>' + esc(cl.firstName) + ' ' + esc(cl.lastName) + '</strong></td>';
      h += '<td>' + esc(cl.programName) + '</td>';
      h += '<td>' + esc(cl.email) + '</td>';
      h += '<td>' + statusLabel(cl.status) + '</td>';
      h += '<td>' + formatDate(cl.startDate) + (cl.endDate ? ' → ' + formatDate(cl.endDate) : '') + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></div>';
    return h;
  }

  /* ═══ DETAIL VIEW ═══ */

        h += '<button class="btn btn--sm remove-panier-btn" data-index="' + i + '" style="font-size:var(--text-xs);color:#c44;border-color:#c44;">×</button>';

    h += '<div style="margin-top:var(--space-sm);display:flex;gap:var(--space-xs);flex-wrap:wrap;align-items:flex-end;">';

    h += '</div>';
    h += '</div>';

    // ── E-books ──
    var ebooksOwned = cl.ebooks || [];

      { id: 'eb1', title: 'Ménopause & perte de poids' },

  /* ═══ CONTENUS VIEW ═══ */
  function renderContenus() {
    var allDocs = state.docs;
    var catLabels = { A: 'Permanent', B: 'Programme', C: 'Perso' };
    var tabLabels = { methode: 'Méthode', essentiels: 'Essentiels', fiches: 'Fiches', recettes: 'Recettes', suivi: 'Suivi', produits: 'Bien-être', ebooks: 'E-books' };
    var fc = state.filterDocCat || 'all';
    var ft = state.filterDocTab || 'all';

    // Apply filters
    var d = allDocs.filter(function(doc) {
      if (fc !== 'all' && doc.category !== fc) return false;
      if (ft !== 'all' && doc.tab !== ft) return false;
      return true;
    });

    var h = '<div class="espace-content" style="padding-top:var(--space-md);">';
    h += '<h2 style="margin-bottom:var(--space-lg);">Gestion des contenus</h2>';

    // Stats (cliquables comme filtres)
    h += '<div class="admin-stats" style="margin-bottom:var(--space-sm);">';
    h += '<div class="stat-card doc-cat-filter" data-cat="all" style="cursor:pointer;' + (fc === 'all' ? 'border-color:var(--color-primary);' : '') + '"><div class="stat-card__number">' + allDocs.length + '</div><div class="stat-card__label">Total</div></div>';
    h += '<div class="stat-card doc-cat-filter" data-cat="A" style="cursor:pointer;' + (fc === 'A' ? 'border-color:#2e7d32;' : '') + '"><div class="stat-card__number" style="color:#2e7d32;">' + allDocs.filter(function(x){return x.category==='A';}).length + '</div><div class="stat-card__label">Permanent</div></div>';
    h += '<div class="stat-card doc-cat-filter" data-cat="B" style="cursor:pointer;' + (fc === 'B' ? 'border-color:#1565c0;' : '') + '"><div class="stat-card__number" style="color:#1565c0;">' + allDocs.filter(function(x){return x.category==='B';}).length + '</div><div class="stat-card__label">Programme</div></div>';
    h += '<div class="stat-card doc-cat-filter" data-cat="C" style="cursor:pointer;' + (fc === 'C' ? 'border-color:#e65100;' : '') + '"><div class="stat-card__number" style="color:#e65100;">' + allDocs.filter(function(x){return x.category==='C';}).length + '</div><div class="stat-card__label">Perso</div></div>';
    h += '</div>';

    // Tab filter
    h += '<div class="filter-bar" style="margin-bottom:var(--space-md);">';
    h += '<button class="filter-btn doc-tab-filter' + (ft === 'all' ? ' active' : '') + '" data-tab="all">Tous</button>';
    Object.keys(tabLabels).forEach(function(k) {
      h += '<button class="filter-btn doc-tab-filter' + (ft === k ? ' active' : '') + '" data-tab="' + k + '">' + tabLabels[k] + '</button>';
    });
    h += '</div>';

    // Results count
    if (d.length !== allDocs.length) {
      h += '<p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-sm);">' + d.length + ' document' + (d.length > 1 ? 's' : '') + ' sur ' + allDocs.length + '</p>';
    }

    // Table with inline editable selects
    h += '<div style="overflow-x:auto;"><table class="client-table">';
    h += '<thead><tr><th>Titre</th><th>Onglet</th><th>Catégorie</th><th>Programme</th><th>Jour</th><th>Assigné à</th><th></th></tr></thead>';
    h += '<tbody>';
    if (d.length === 0) {
      h += '<tr><td colspan="7" style="text-align:center;color:var(--color-text-muted);padding:var(--space-xl);">Aucun document</td></tr>';
    }
    d.forEach(function(doc) {
      var idx = allDocs.indexOf(doc);
      var assignNames = '';
      if (doc.category === 'C' && doc.assignedTo && doc.assignedTo.length) {
        assignNames = doc.assignedTo.map(function(tok) {
          var cl = state.clients.find(function(c) { return c.token === tok; });
          return cl ? cl.firstName : tok.slice(0,6);
        }).join(', ');
      }
      h += '<tr>';
      h += '<td><strong>' + esc(doc.title) + '</strong></td>';
      // Inline editable: onglet
      h += '<td><select class="doc-edit-tab" data-idx="' + idx + '" style="font-size:var(--text-xs);padding:2px 4px;border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer;">';
      Object.keys(tabLabels).forEach(function(k) { h += '<option value="' + k + '"' + (doc.tab === k ? ' selected' : '') + '>' + tabLabels[k] + '</option>'; });
      h += '</select></td>';
      // Inline editable: catégorie
      h += '<td><select class="doc-edit-cat" data-idx="' + idx + '" style="font-size:var(--text-xs);padding:2px 4px;border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer;">';
      ['A','B','C'].forEach(function(c) { h += '<option value="' + c + '"' + (doc.category === c ? ' selected' : '') + '>' + catLabels[c] + '</option>'; });
      h += '</select></td>';
      // Inline editable: programme min
      h += '<td><select class="doc-edit-prog" data-idx="' + idx + '" style="font-size:var(--text-xs);padding:2px 4px;border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer;">';
      h += '<option value=""' + (!doc.minProgram ? ' selected' : '') + '>—</option>';
      h += '<option value="reset21"' + (doc.minProgram === 'reset21' ? ' selected' : '') + '>Reset 21</option>';
      h += '<option value="evolution"' + (doc.minProgram === 'evolution' ? ' selected' : '') + '>Evolution</option>';
      h += '</select></td>';
      // Inline editable: jour
      h += '<td><input type="number" class="doc-edit-day" data-idx="' + idx + '" value="' + (doc.dayStart || 0) + '" min="0" style="width:50px;font-size:var(--text-xs);padding:2px 4px;border:1px solid var(--color-border);border-radius:var(--radius-sm);text-align:center;"></td>';
      h += '<td style="font-size:var(--text-xs);">' + (assignNames || '—') + '</td>';
      h += '<td><button class="btn btn--outline btn--sm remove-doc-btn" data-idx="' + idx + '" style="font-size:var(--text-xs);color:#c44;border-color:#c44;padding:2px 8px;">×</button></td>';
      h += '</tr>';
    });
    // Ligne d'ajout en bas du tableau
    h += '<tr style="background:var(--color-bg-warm);">';
    h += '<td><input type="text" id="doc-title" class="form__input" placeholder="Titre du nouveau document..." style="padding:4px 8px;font-size:var(--text-sm);"></td>';
    h += '<td><select id="doc-tab" style="font-size:var(--text-xs);padding:2px 4px;border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer;">';
    Object.keys(tabLabels).forEach(function(k) { h += '<option value="' + k + '">' + tabLabels[k] + '</option>'; });
    h += '</select></td>';
    h += '<td><select id="doc-cat" style="font-size:var(--text-xs);padding:2px 4px;border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer;"><option value="A">Permanent</option><option value="B" selected>Programme</option><option value="C">Perso</option></select></td>';
    h += '<td><select id="doc-prog" style="font-size:var(--text-xs);padding:2px 4px;border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer;"><option value="">—</option><option value="reset21">Reset 21</option><option value="evolution">Evolution</option></select></td>';
    h += '<td><input type="number" id="doc-day" value="0" min="0" style="width:50px;font-size:var(--text-xs);padding:2px 4px;border:1px solid var(--color-border);border-radius:var(--radius-sm);text-align:center;"></td>';
    h += '<td><select id="doc-assign" style="font-size:var(--text-xs);padding:2px 4px;border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer;"><option value="">—</option>';
    state.clients.forEach(function(cl) { if (cl.token) h += '<option value="' + esc(cl.token) + '">' + esc(cl.firstName) + '</option>'; });
    h += '</select></td>';
    h += '<td><button class="btn btn--primary btn--sm" id="save-doc-btn" style="padding:4px 12px;font-size:var(--text-xs);">+</button></td>';
    h += '</tr>';
    h += '</tbody></table></div>';

    h += '</div>';
    return h;
  }

  /* ═══ EVENTS ═══ */
  function bindEvents() {
    // Admin nav tabs
    document.querySelectorAll('[data-admin-tab]').forEach(function(btn) {
      btn.addEventListener('click', function() { state.view = this.dataset.adminTab; render(); window.scrollTo(0,0); });
    });

    // Dashboard — ouvrir fiche cliente
    document.querySelectorAll('.dashboard-goto').forEach(function(btn) {
      btn.addEventListener('click', function() {
        state.selectedToken = this.dataset.token;
        state.view = 'detail';
        render();
        window.scrollTo(0,0);
      });
    });

    // Notes privées
    var savePrivNotesBtn = document.getElementById('save-private-notes-btn');
    if (savePrivNotesBtn) savePrivNotesBtn.addEventListener('click', function() {
      var cl = state.clients.find(function(c) { return c.token === state.selectedToken || c.email === state.selectedToken; });
      if (!cl) return;
      var ta = document.getElementById('private-notes-textarea');
      cl.privateNotes = ta.value;
      try { localStorage.setItem('ss_private_notes_' + (cl.token || cl.email), ta.value); } catch(e) {}
      showToast('Notes privées enregistrées');
    });

    // Export CSV — leads
    var expLeadsBtn = document.getElementById('export-leads-csv');
    if (expLeadsBtn) expLeadsBtn.addEventListener('click', function() {
      var interetLabels = { mieux_corps: 'Mieux dans mon corps', energie: 'Retrouver de l\'énergie', apparence: 'Prendre soin de mon apparence', reconnecter: 'Me reconnecter à moi', tout: 'Un peu de tout' };
      var situationLabels = { changer: 'Doit changer quelque chose', essaye_seule: 'A déjà essayé seule', perdue: 'Perdue, ne sait par où commencer', curiosite: 'Curieuse, sans urgence' };
      var rows = [['Date', 'Prenom', 'Nom', 'Email', 'Telephone', 'Interet', 'Situation', 'Source']];
      state.leads.forEach(function(l) {
        rows.push([l.date, l.prenom, l.nom, l.email, l.telephone || '', interetLabels[l.interet] || l.interet || '', situationLabels[l.situation] || l.situation || '', l.source]);
      });
      downloadCSV(rows, 'leads-sois-sublime-' + new Date().toISOString().slice(0,10) + '.csv');
    });

    // Export CSV — clientes
    var expClientsBtn = document.getElementById('export-clients-csv');
    if (expClientsBtn) expClientsBtn.addEventListener('click', function() {
      var rows = [['Prenom', 'Nom', 'Email', 'Telephone', 'Programme', 'Statut', 'Debut', 'Fin', 'Envoyee par']];
      state.clients.forEach(function(cl) {
        var sentBy = '';
        if (cl.referredBy) {
          var t = state.team.find(function(x) { return x.id === cl.referredBy; });
          sentBy = t ? (t.firstName + ' ' + t.lastName) : '';
        }
        rows.push([cl.firstName, cl.lastName, cl.email, cl.phone || '', cl.programName, cl.status, cl.startDate || '', cl.endDate || '', sentBy]);
      });
      downloadCSV(rows, 'clientes-sois-sublime-' + new Date().toISOString().slice(0,10) + '.csv');
    });

    // Contenus: save doc (inline en bas du tableau)
    var saveDocBtn = document.getElementById('save-doc-btn');
    if (saveDocBtn) saveDocBtn.addEventListener('click', function() {
      var title = document.getElementById('doc-title');
      if (!title || !title.value.trim()) { showToast('Titre requis'); return; }
      var cat = document.getElementById('doc-cat').value;
      var assign = document.getElementById('doc-assign');
      var doc = {
        id: 'd' + Date.now(),
        title: title.value.trim(),
        tab: document.getElementById('doc-tab').value,
        category: cat,
        minProgram: document.getElementById('doc-prog').value,
        dayStart: parseInt(document.getElementById('doc-day').value) || 0,
        file: '(upload simulé)',
        assignedTo: (cat === 'C' && assign && assign.value) ? [assign.value] : []
      };
      state.docs.push(doc);
      showToast('Document ajouté !');
      render();
    });
    // Contenus: remove doc
    document.querySelectorAll('.remove-doc-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        state.docs.splice(parseInt(this.dataset.idx), 1);
        showToast('Document supprimé');
        render();
      });
    });

    // Contenus: category filter (cards)
    document.querySelectorAll('.doc-cat-filter').forEach(function(card) {
      card.addEventListener('click', function() {
        state.filterDocCat = this.dataset.cat;
        render();
      });
    });
    // Contenus: tab filter
    document.querySelectorAll('.doc-tab-filter').forEach(function(btn) {
      btn.addEventListener('click', function() {
        state.filterDocTab = this.dataset.tab;
        render();
      });
    });
    // Contenus: inline edit tab
    document.querySelectorAll('.doc-edit-tab').forEach(function(sel) {
      sel.addEventListener('change', function() { state.docs[parseInt(this.dataset.idx)].tab = this.value; showToast('Onglet modifié'); });
    });
    // Contenus: inline edit category
    document.querySelectorAll('.doc-edit-cat').forEach(function(sel) {
      sel.addEventListener('change', function() { state.docs[parseInt(this.dataset.idx)].category = this.value; showToast('Catégorie modifiée'); });
    });
    // Contenus: inline edit programme
    document.querySelectorAll('.doc-edit-prog').forEach(function(sel) {
      sel.addEventListener('change', function() { state.docs[parseInt(this.dataset.idx)].minProgram = this.value; showToast('Programme modifié'); });
    });
    // Contenus: inline edit day
    document.querySelectorAll('.doc-edit-day').forEach(function(inp) {
      inp.addEventListener('change', function() { state.docs[parseInt(this.dataset.idx)].dayStart = parseInt(this.value) || 0; showToast('Jour modifié'); });
    });

    // Doc category change → show/hide assign
    var docCat = document.getElementById('doc-cat');
    if (docCat) docCat.addEventListener('change', function() {
      var sec = document.getElementById('doc-assign-section');
      if (sec) sec.style.display = this.value === 'C' ? 'block' : 'none';
    });

    // Save doc
    var saveDocBtn = document.getElementById('save-doc-btn');
    if (saveDocBtn) saveDocBtn.addEventListener('click', function() {
      var title = document.getElementById('doc-title');
      if (!title || !title.value.trim()) { showToast('Titre requis'); return; }
      var doc = {
        id: 'd' + Date.now(),
        title: title.value.trim(),
        tab: document.getElementById('doc-tab').value,
        category: document.getElementById('doc-cat').value,
        minProgram: document.getElementById('doc-prog').value,
        dayStart: parseInt(document.getElementById('doc-day').value) || 0,
        file: '(upload simulé)',
        assignedTo: []
      };
      var assign = document.getElementById('doc-assign');
      if (doc.category === 'C' && assign && assign.value) doc.assignedTo = [assign.value];
      state.docs.push(doc);
      showToast('Document ajouté !');
      render();
    });

    // Remove doc
    document.querySelectorAll('.remove-doc-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        state.docs.splice(parseInt(this.dataset.idx), 1);
        showToast('Document supprimé');
        render();
      });
    });

    // Search
    var searchInput = document.getElementById('search-input');
    if (searchInput) {
      searchInput.addEventListener('input', function() { state.search = this.value; render(); });
      searchInput.focus();
      searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
    }

    // Filter by programme
    var filterProg = document.getElementById('filter-program');
    if (filterProg) filterProg.addEventListener('change', function() { state.filterProgram = this.value; render(); });

    // Filter by status (stat cards)
    document.querySelectorAll('.stat-filter').forEach(function(card) {
      card.addEventListener('click', function() {
        var s = this.dataset.filterStatus;
        state.filterStatus = (state.filterStatus === s && s !== 'all') ? 'all' : s;
        render();
      });
    });

    // Clear filters
    var clearBtn = document.getElementById('clear-filters-btn');
    if (clearBtn) clearBtn.addEventListener('click', function() {
      state.search = ''; state.filterStatus = 'all'; state.filterProgram = 'all';
      render();
    });

    // Row click → detail
    document.querySelectorAll('.client-table tr[data-token]').forEach(function(row) {
      row.addEventListener('click', function() {
        var token = this.dataset.token;
        var cl = state.clients.find(function(c) { return c.token === token || c.email === token; });
        if (cl) { state.selectedToken = cl.token || cl.email; }
        state.view = 'detail';
        state.noteText = '';
        render();
        window.scrollTo(0, 0);
      });
    });

    // Back button
    var backBtn = document.getElementById('back-btn');
    if (backBtn) backBtn.addEventListener('click', function() { state.view = 'list'; render(); });

    // Upgrade programme
    var upgradeBtn = document.getElementById('upgrade-btn');
    if (upgradeBtn) upgradeBtn.addEventListener('click', function() {
      var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
      if (!cl) return;
      cl.program = 'evolution';
      cl.programName = 'Sublime Evolution';
      var end = new Date(cl.startDate);
      end.setDate(end.getDate() + 90);
      cl.endDate = end.toISOString().slice(0, 10);
      cl.options.tracker = true;
      cl.options.recettesPerso = true;
      showToast('Upgrade vers Évolution ! Toutes les options activées.');
      render();
    });

    // Prolonger accès (jours variables)
    var extendBtn = document.getElementById('extend-btn');
    if (extendBtn) extendBtn.addEventListener('click', function() {
      var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
      if (!cl) return;
      var daysInput = document.getElementById('extend-days');
      var days = parseInt(daysInput ? daysInput.value : 30) || 30;
      var end = cl.endDate ? new Date(cl.endDate) : new Date();
      end.setDate(end.getDate() + days);
      cl.endDate = end.toISOString().slice(0, 10);
      if (cl.status === 'expired') cl.status = 'active';
      showToast('Accès prolongé de ' + days + ' jours !');
      render();
    });

    // New program
    var newProgBtn = document.getElementById('new-program-btn');
    if (newProgBtn) newProgBtn.addEventListener('click', function() {
      var cl = state.clients.find(function(c) { return c.token === state.selectedToken || c.email === state.selectedToken; });
      if (!cl) return;
      var select = document.getElementById('new-program-select');
      var newProg = select ? select.value : 'reset21';
      var progNames = { reset21: 'Sublime Reset 21', evolution: 'Sublime Evolution' };
      var durations = { reset21: 21, evolution: 90 };
      // Archive current program
      if (cl.program && cl.startDate) {
        if (!cl.programHistory) cl.programHistory = [];
        cl.programHistory.unshift({
          program: cl.program,
          programName: cl.programName,
          startDate: cl.startDate,
          endDate: cl.endDate,
          status: cl.status === 'active' ? 'completed' : cl.status
        });
      }
      // Set new program
      cl.program = newProg;
      cl.programName = progNames[newProg];
      cl.startDate = new Date().toISOString().slice(0, 10);
      var end = new Date();
      end.setDate(end.getDate() + durations[newProg]);
      cl.endDate = end.toISOString().slice(0, 10);
      cl.status = 'active';
      if (newProg === 'evolution') { cl.options.tracker = true; cl.options.recettesPerso = true; }
      showToast('Nouveau programme ' + progNames[newProg] + ' démarré !');
      render();
    });

    // Toggle options
    document.querySelectorAll('.toggle-option-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
        if (!cl) return;
        var key = this.dataset.option;
        cl.options[key] = !cl.options[key];
        showToast(cl.options[key] ? 'Option activée !' : 'Option désactivée');
        render();
      });
    });

    // Toggle ebooks
    document.querySelectorAll('.toggle-ebook-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
        if (!cl) return;
        var title = this.dataset.ebook;
        var idx = cl.ebooks.indexOf(title);
        if (idx === -1) { cl.ebooks.push(title); showToast('E-book marqué comme acheté'); }
        else { cl.ebooks.splice(idx, 1); showToast('E-book retiré'); }
        render();
      });
    });

    // Copy link
    var copyBtn = document.getElementById('copy-link-btn');
    if (copyBtn) copyBtn.addEventListener('click', function() {
      var link = this.dataset.link;
      navigator.clipboard.writeText(link).then(function() { showToast('Lien copié !'); });
    });

    // Activate access
    var activateBtn = document.getElementById('activate-btn');
    if (activateBtn) activateBtn.addEventListener('click', function() {
      var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
      if (!cl) return;

      if (!CONFIG.WEBHOOK_ADMIN_ACTIVATE) {
        // Mock: generate token, set status active, set dates
        cl.token = 'tok-' + Math.random().toString(36).substr(2, 12);
        cl.status = 'active';
        cl.startDate = new Date().toISOString().slice(0, 10);
        var end = new Date();
        end.setDate(end.getDate() + (cl.program === 'reset21' ? 21 : 90));
        cl.endDate = end.toISOString().slice(0, 10);
        state.selectedToken = cl.token;
        showToast('Accès activé pour ' + cl.firstName + ' ! (mock)');
        render();
        return;
      }

      fetch(CONFIG.WEBHOOK_ADMIN_ACTIVATE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: cl.email, program: cl.program })
      }).then(function(r) { return r.json(); })
        .then(function(data) {
          cl.token = data.token;
          cl.status = 'active';
          cl.startDate = data.startDate;
          cl.endDate = data.endDate;
          state.selectedToken = cl.token;
          showToast('Accès activé et email envoyé !');
          render();
        }).catch(function() { showToast('Erreur — réessaie'); });
    });

    // Team: save new team member
    var saveTeamBtn = document.getElementById('save-team-btn');
    if (saveTeamBtn) saveTeamBtn.addEventListener('click', function() {
      var fn = document.getElementById('team-firstname');
      var ln = document.getElementById('team-lastname');
      if (!fn || !fn.value.trim() || !ln.value.trim()) { showToast('Prénom et nom requis'); return; }
      var t = {
        id: 't' + Date.now(),
        firstName: fn.value.trim(),
        lastName: ln.value.trim(),
        email: (document.getElementById('team-email') || {}).value || '',
        addedDate: new Date().toISOString().slice(0, 10)
      };
      state.team.push(t);
      showToast('Membre ajoutée à ton équipe !');
      render();
    });
    // Team: remove
    document.querySelectorAll('.remove-team-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        state.team.splice(parseInt(this.dataset.idx), 1);
        showToast('Retirée de l\'équipe');
        render();
      });
    });
    // ReferredBy select on client detail
    document.querySelectorAll('.referredBy-select').forEach(function(sel) {
      sel.addEventListener('change', function() {
        var cl = state.clients.find(function(c) { return c.token === state.selectedToken || c.email === state.selectedToken; });
        if (!cl) return;
        cl.referredBy = this.value;
        showToast(this.value ? 'Filiation mise à jour' : 'Filiation retirée');
      });
    });

    // Doc checkboxes (assign/unassign)
    document.querySelectorAll('.doc-check').forEach(function(cb) {
      cb.addEventListener('change', function() {
        var cl = state.clients.find(function(c) { return c.token === state.selectedToken || c.email === state.selectedToken; });
        if (!cl) return;
        if (!cl.assignedDocs) cl.assignedDocs = [];
        var docId = this.dataset.docId;
        if (this.checked) {
          if (cl.assignedDocs.indexOf(docId) === -1) cl.assignedDocs.push(docId);
          showToast('Contenu activé');
        } else {
          cl.assignedDocs = cl.assignedDocs.filter(function(d) { return d !== docId; });
          showToast('Contenu retiré');
        }
      });
    });

    // Add perso doc from client detail
    document.querySelectorAll('.add-perso-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cl = state.clients.find(function(c) { return c.token === state.selectedToken || c.email === state.selectedToken; });
        if (!cl) return;
        var tab = this.dataset.tab;
        var input = document.querySelector('.add-perso-title[data-tab="' + tab + '"]');
        if (!input || !input.value.trim()) { showToast('Titre requis'); return; }
        var doc = {
          id: 'dp' + Date.now(),
          title: input.value.trim(),
          tab: tab,
          category: 'C',
          minProgram: '',
          dayStart: 0,
          file: '(upload simulé)',
          assignedTo: [cl.token]
        };
        state.docs.push(doc);
        if (!cl.assignedDocs) cl.assignedDocs = [];
        cl.assignedDocs.push(doc.id);
        showToast('Document personnalisé ajouté !');
        render();
      });
    });

    // Paniers — add
    var addPanierBtn = document.getElementById('add-panier-btn');
    if (addPanierBtn) addPanierBtn.addEventListener('click', function() {
      var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
      if (!cl) return;
      var nameEl = document.getElementById('panier-name');
      var urlEl = document.getElementById('panier-url');
      if (!nameEl.value.trim()) { showToast('Nom du produit requis'); return; }
      if (!cl.paniers) cl.paniers = [];
      cl.paniers.push({ name: nameEl.value.trim(), url: urlEl.value.trim() || '#' });
      showToast('Produit ajouté !');
      render();
    });

    // Paniers — remove
    document.querySelectorAll('.remove-panier-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
        if (!cl) return;
        cl.paniers.splice(parseInt(this.dataset.index), 1);
        showToast('Produit retiré');
        render();
      });
    });

    // Paniers — edit
    document.querySelectorAll('.edit-panier-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
        if (!cl) return;
        var idx = parseInt(this.dataset.index);
        var p = cl.paniers[idx];
        var newUrl = prompt('Nouvelle URL pour ' + p.name + ' :', p.url);
        if (newUrl !== null) {
          p.url = newUrl;
          showToast('URL mise à jour');
          render();
        }
      });
    });

    // Tracker — coach comment
    document.querySelectorAll('.tracker-comment-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
        if (!cl) return;
        var idx = parseInt(this.dataset.idx);
        var input = document.querySelector('.tracker-comment-input[data-idx="' + idx + '"]');
        if (!input || !input.value.trim()) { showToast('Écris un commentaire'); return; }
        cl.tracker[idx].coachComment = input.value.trim();
        showToast('Commentaire ajouté !');
        render();
      });
    });

    // Note textarea
    var noteArea = document.getElementById('note-textarea');
    if (noteArea) noteArea.addEventListener('input', function() { state.noteText = this.value; });

    // Add note
    var addNoteBtn = document.getElementById('add-note-btn');
    if (addNoteBtn) addNoteBtn.addEventListener('click', function() {
      if (!state.noteText.trim()) { showToast('Écris quelque chose avant d\'enregistrer'); return; }
      var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
      if (!cl) return;

      var note = { date: new Date().toISOString().slice(0, 10), text: state.noteText.trim() };

      if (!CONFIG.WEBHOOK_ADMIN_NOTE) {
        cl.coachNotes.unshift(note);
        state.noteText = '';
        showToast('Note enregistrée !');
        render();
        return;
      }

      fetch(CONFIG.WEBHOOK_ADMIN_NOTE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: cl.token, text: note.text })
      }).then(function(r) { return r.json(); })
        .then(function() { cl.coachNotes.unshift(note); state.noteText = ''; showToast('Note enregistrée !'); render(); })
        .catch(function() { showToast('Erreur — réessaie'); });
    });
  }

  /* ═══ INIT ═══ */
  loadData();
})();
</script>
</body>
</html>
