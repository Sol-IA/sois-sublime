<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Sois Sublime</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="32x32" href="../assets-sandra/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
/* Admin specific */
.admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: var(--space-sm); margin-bottom: var(--space-lg); }
.stat-card { background: var(--color-white); border-radius: var(--radius-md); padding: var(--space-md); text-align: center; border: 1px solid var(--color-border-light); }
.stat-card__number { font-family: var(--font-heading); font-size: var(--text-3xl); color: var(--color-primary); line-height: 1; }
.stat-card__label { font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

.client-table { width: 100%; border-collapse: collapse; }
.client-table th { font-family: var(--font-heading); font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-muted); text-align: left; padding: var(--space-sm); border-bottom: 2px solid var(--color-border); }
.client-table td { padding: var(--space-sm); border-bottom: 1px solid var(--color-border-light); font-size: var(--text-sm); vertical-align: middle; }
.client-table tr { cursor: pointer; transition: background var(--transition); }
.client-table tr:hover { background: var(--color-bg-warm); }

.badge { display: inline-block; font-size: var(--text-xs); padding: 3px 10px; border-radius: var(--radius-full); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.badge--active { background: #e8f5e9; color: #2e7d32; }
.badge--pending { background: #fff3e0; color: #e65100; }
.badge--expired { background: #fce4ec; color: #c62828; }

.detail-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: var(--space-sm); margin-bottom: var(--space-lg); }
.detail-header h2 { margin-bottom: 0; }
.detail-actions { display: flex; gap: var(--space-xs); flex-wrap: wrap; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-sm); margin-bottom: var(--space-lg); }
@media (max-width: 640px) { .detail-grid { grid-template-columns: 1fr; } }
.detail-item { font-size: var(--text-sm); }
.detail-item__label { font-weight: 600; color: var(--color-text-muted); font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.04em; }

.note-form { background: var(--color-white); border-radius: var(--radius-lg); padding: var(--space-lg); border: 1px solid var(--color-border-light); margin-bottom: var(--space-lg); }

.tracker-table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
.tracker-table th { font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.04em; color: var(--color-text-muted); text-align: left; padding: 8px; border-bottom: 2px solid var(--color-border); }
.tracker-table td { padding: 8px; border-bottom: 1px solid var(--color-border-light); }

.back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: var(--text-sm); color: var(--color-accent); cursor: pointer; margin-bottom: var(--space-md); background: none; border: none; font-family: inherit; }
.back-btn:hover { text-decoration: underline; }

@media (max-width: 768px) {
  .client-table th:nth-child(3), .client-table td:nth-child(3),
  .client-table th:nth-child(5), .client-table td:nth-child(5) { display: none; }
}
</style>
</head>
<body class="espace">

<div id="app"></div>
<div class="toast" id="toast"></div>

<script src="../config.js"></script>
<script>
(function() {
  'use strict';

  /* ═══ MOCK DATA ═══ */
  var MOCK_CLIENTS = [
    {
      token: 'abc123-def456-ghi789',
      firstName: 'Marie', lastName: 'Dupont',
      email: 'marie.dupont@email.com', phone: '06 12 34 56 78',
      program: 'evolution', programName: 'Sublime Evolution',
      startDate: '2026-03-15', endDate: '2026-06-15',
      status: 'active',
      programHistory: [
        { program: 'reset21', programName: 'Sublime Reset 21', startDate: '2025-12-01', endDate: '2025-12-22', status: 'completed' }

      ],

        { date: '2026-04-11', fringales: 'non', activite: 'sport', respect: 'oui', humeur: 'forme', notes: '' },
        { date: '2026-04-10', fringales: 'un_peu', activite: 'marche', respect: 'a_peu_pres', humeur: 'stable', notes: 'Journée chargée' },
        { date: '2026-04-09', fringales: 'non', activite: 'sport', respect: 'oui', humeur: 'forme', notes: 'Super séance !' },
        { date: '2026-04-08', fringales: 'non', activite: 'non', respect: 'oui', humeur: 'stable', notes: '' }
      ],
      coachNotes: [
        { date: '2026-04-07', text: 'Super progrès cette semaine Marie ! Tes habitudes se mettent bien en place. Continue comme ça.' },
        { date: '2026-03-25', text: 'On a travaillé sur la composition des petits-déjeuners. Marie a bien compris le principe IG Bas. RDV dans 2 semaines.' }
      ]
    },
    {
      token: 'jkl012-mno345-pqr678',
      firstName: 'Sophie', lastName: 'Martin',
      email: 'sophie.martin@email.com', phone: '06 98 76 54 32',
      program: 'reset21', programName: 'Sublime Reset 21',
      startDate: '2026-04-01', endDate: '2026-04-22',
      status: 'active',
      programHistory: [],
      options: { tracker: false, recettesPerso: false },
      paniers: [],
      ebooks: [],
      tracker: [
        { date: '2026-04-11', fringales: 'oui', activite: 'non', respect: 'a_peu_pres', humeur: 'pas_top', moment_soi: 'non', difficulte: 'oui', notes: 'Difficile aujourd\'hui', coachComment: '' }
      ],
      coachNotes: []
    },
    {
      token: 'stu901-vwx234-yza567',
      firstName: 'Isabelle', lastName: 'Roux',
      email: 'isabelle.roux@email.com', phone: '06 11 22 33 44',
      program: 'reset21', programName: 'Sublime Reset 21',
      startDate: '2026-01-10', endDate: '2026-01-31',
      status: 'expired',
      programHistory: [],
      options: { tracker: false, recettesPerso: false },
      paniers: [],
      ebooks: [],
      tracker: [
        { date: '2026-01-25', fringales: 'non', activite: 'marche', respect: 'oui', humeur: 'forme', notes: '' },
        { date: '2026-01-20', fringales: 'non', activite: 'sport', respect: 'oui', humeur: 'forme', notes: 'Très motivée' }
      ],
      coachNotes: [
        { date: '2026-01-30', text: 'Programme terminé. Isabelle a perdu 3kg et se sent beaucoup mieux. On envisage un passage à Evolution.' }
      ]
    },
    {
      token: '',
      firstName: 'Claire', lastName: 'Bernard',
      email: 'claire.bernard@email.com', phone: '06 55 44 33 22',
      program: 'evolution', programName: 'Sublime Evolution',
      startDate: '', endDate: '',
      status: 'pending',
      programHistory: [],
      options: { tracker: false, recettesPerso: false },
      paniers: [],
      ebooks: [],
      tracker: [],
      coachNotes: []
    }
  ];

  /* ═══ STATE ═══ */
  var state = { view: 'list', clients: [], selectedToken: null, noteText: '', search: '', filterStatus: 'all', filterProgram: 'all' };
  var app = document.getElementById('app');

  /* ═══ UTILS ═══ */
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function formatDate(d) { if (!d) return '—'; var p = d.split('-'); return p[2] + '/' + p[1] + '/' + p[0]; }
  function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 3000); }
  function statusLabel(s) {
    var m = { active: ['Active', 'badge--active'], pending: ['En attente', 'badge--pending'], expired: ['Expirée', 'badge--expired'] };
    var r = m[s] || m.pending;
    return '<span class="badge ' + r[1] + '">' + r[0] + '</span>';
  }
  var moods = { forme: '😄', stable: '😐', pas_top: '😔' };
  var respects = { oui: '✅', a_peu_pres: '🟡', non: '🔴' };

  /* ═══ LOAD DATA ═══ */
  function loadData() {
    if (!CONFIG.WEBHOOK_ADMIN_CLIENTS) {
      state.clients = MOCK_CLIENTS;
      render();
      return;
    }
    fetch(CONFIG.WEBHOOK_ADMIN_CLIENTS)
      .then(function(r) { return r.json(); })
      .then(function(data) { state.clients = data; render(); })
      .catch(function() { state.clients = MOCK_CLIENTS; render(); });
  }

  /* ═══ RENDER ═══ */
  function render() {
    var h = renderHeader();
    if (state.view === 'list') { h += renderList(); }
    else if (state.view === 'detail') { h += renderDetail(); }
    app.innerHTML = h;
    bindEvents();
  }

  function renderHeader() {
    return '<header class="header" style="background:var(--color-primary);border-bottom:none;">' +
      '<div class="header__inner">' +
      '<a class="header__logo" href="../index.html"><img src="../assets-sandra/logo-sandra-prune.svg" alt="Sois Sublime" width="40" height="40" style="filter:brightness(0) invert(1);"><span style="color:#fff;">Sois Sublime</span></a>' +
      '<span style="color:rgba(255,255,255,.6);font-family:var(--font-heading);font-size:var(--text-sm);letter-spacing:0.06em;text-transform:uppercase;">Admin</span>' +
      '</div></header>';
  }

  /* ═══ LIST VIEW ═══ */
  function renderList() {
    var all = state.clients;
    var active = all.filter(function(cl) { return cl.status === 'active'; }).length;
    var pending = all.filter(function(cl) { return cl.status === 'pending'; }).length;
    var expired = all.filter(function(cl) { return cl.status === 'expired'; }).length;

    // Apply filters
    var c = all.filter(function(cl) {
      if (state.filterStatus !== 'all' && cl.status !== state.filterStatus) return false;
      if (state.filterProgram !== 'all' && cl.program !== state.filterProgram) return false;
      if (state.search) {
        var q = state.search.toLowerCase();
        var match = (cl.firstName + ' ' + cl.lastName).toLowerCase().indexOf(q) !== -1 ||
                    cl.email.toLowerCase().indexOf(q) !== -1 ||
                    (cl.phone || '').indexOf(q) !== -1;
        if (!match) return false;
      }
      return true;
    });

    var h = '<div class="espace-content" style="padding-top:calc(var(--header-h) + var(--space-md));">';

    // Stats (cliquables comme filtres)
    h += '<div class="admin-stats">';
    h += '<div class="stat-card stat-filter" data-filter-status="all" style="cursor:pointer;' + (state.filterStatus === 'all' ? 'border-color:var(--color-primary);' : '') + '"><div class="stat-card__number">' + all.length + '</div><div class="stat-card__label">Total</div></div>';
    h += '<div class="stat-card stat-filter" data-filter-status="active" style="cursor:pointer;' + (state.filterStatus === 'active' ? 'border-color:#2e7d32;' : '') + '"><div class="stat-card__number" style="color:#2e7d32;">' + active + '</div><div class="stat-card__label">Actives</div></div>';
    h += '<div class="stat-card stat-filter" data-filter-status="pending" style="cursor:pointer;' + (state.filterStatus === 'pending' ? 'border-color:#e65100;' : '') + '"><div class="stat-card__number" style="color:#e65100;">' + pending + '</div><div class="stat-card__label">En attente</div></div>';
    h += '<div class="stat-card stat-filter" data-filter-status="expired" style="cursor:pointer;' + (state.filterStatus === 'expired' ? 'border-color:#c62828;' : '') + '"><div class="stat-card__number" style="color:#c62828;">' + expired + '</div><div class="stat-card__label">Expirées</div></div>';
    h += '</div>';

    // Search + programme filter
    h += '<div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-md);flex-wrap:wrap;align-items:center;">';
    h += '<input type="text" id="search-input" class="form__input" value="' + esc(state.search) + '" placeholder="Rechercher par nom, email, tel..." style="flex:1;min-width:200px;padding:8px 14px;font-size:var(--text-sm);">';
    h += '<select id="filter-program" class="form__input" style="width:auto;padding:8px 14px;font-size:var(--text-sm);cursor:pointer;">';
    h += '<option value="all"' + (state.filterProgram === 'all' ? ' selected' : '') + '>Tous les programmes</option>';
    h += '<option value="reset21"' + (state.filterProgram === 'reset21' ? ' selected' : '') + '>Reset 21</option>';
    h += '<option value="evolution"' + (state.filterProgram === 'evolution' ? ' selected' : '') + '>Evolution</option>';
    h += '</select>';
    if (state.search || state.filterStatus !== 'all' || state.filterProgram !== 'all') {
      h += '<button class="btn btn--outline btn--sm" id="clear-filters-btn">Effacer les filtres</button>';
    }
    h += '</div>';

    // Results count
    if (c.length !== all.length) {
      h += '<p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-sm);">' + c.length + ' résultat' + (c.length > 1 ? 's' : '') + ' sur ' + all.length + '</p>';
    }

    // Table
    h += '<div style="overflow-x:auto;">';
    h += '<table class="client-table">';
    h += '<thead><tr><th>Nom</th><th>Programme</th><th>Email</th><th>Statut</th><th>Dates</th></tr></thead>';
    h += '<tbody>';
    if (c.length === 0) {
      h += '<tr><td colspan="5" style="text-align:center;color:var(--color-text-muted);padding:var(--space-xl);">Aucune cliente trouvée</td></tr>';
    }
    c.forEach(function(cl) {
      h += '<tr data-token="' + esc(cl.token || cl.email) + '">';
      h += '<td><strong>' + esc(cl.firstName) + ' ' + esc(cl.lastName) + '</strong></td>';
      h += '<td>' + esc(cl.programName) + '</td>';
      h += '<td>' + esc(cl.email) + '</td>';
      h += '<td>' + statusLabel(cl.status) + '</td>';
      h += '<td>' + formatDate(cl.startDate) + (cl.endDate ? ' → ' + formatDate(cl.endDate) : '') + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></div>';
    return h;
  }

  /* ═══ DETAIL VIEW ═══ */
  function renderDetail() {
    var cl = state.clients.find(function(c) { return c.token === state.selectedToken || c.email === state.selectedToken; });
    if (!cl) { state.view = 'list'; render(); return ''; }

    var siteUrl = CONFIG.siteUrl || 'https://sois-sublime.fr';
    var espaceLink = siteUrl + '/espace/?t=' + cl.token;

    var h = '<div class="espace-content" style="padding-top:calc(var(--header-h) + var(--space-md));">';

    // Back button
    h += '<button class="back-btn" id="back-btn">← Retour à la liste</button>';

    // Header + actions
    h += '<div class="detail-header">';
    h += '<div><h2>' + esc(cl.firstName) + ' ' + esc(cl.lastName) + '</h2>';
    h += '<p style="color:var(--color-text-muted);margin:0;">' + esc(cl.programName) + ' · ' + statusLabel(cl.status) + '</p></div>';
    h += '<div class="detail-actions">';
    if (cl.status === 'pending') {
      h += '<button class="btn btn--primary btn--sm" id="activate-btn">Activer l\'accès</button>';
    }
    if (cl.token) {
      h += '<button class="btn btn--outline btn--sm" id="copy-link-btn" data-link="' + esc(espaceLink) + '">Copier le lien</button>';
    }
    h += '</div></div>';

    // Info grid
    h += '<div class="detail-grid">';
    h += '<div class="detail-item"><div class="detail-item__label">Email</div><a href="mailto:' + esc(cl.email) + '" style="color:var(--color-accent);">' + esc(cl.email) + '</a></div>';
    h += '<div class="detail-item"><div class="detail-item__label">Téléphone</div>' + (cl.phone ? '<a href="tel:' + esc(cl.phone) + '">' + esc(cl.phone) + '</a>' : '—') + '</div>';
    h += '<div class="detail-item"><div class="detail-item__label">Début</div>' + formatDate(cl.startDate) + '</div>';
    h += '<div class="detail-item"><div class="detail-item__label">Fin</div>' + formatDate(cl.endDate) + '</div>';
    if (cl.token) {
      h += '<div class="detail-item" style="grid-column:1/-1;"><div class="detail-item__label">Lien espace client</div><span style="font-size:var(--text-xs);color:var(--color-text-muted);word-break:break-all;">' + esc(espaceLink) + '</span></div>';
    }
    h += '</div>';

    // ── Programme & accès ──
    h += '<div class="card" style="margin-bottom:var(--space-lg);padding:var(--space-lg);">';
    h += '<h3 style="margin-bottom:var(--space-md);">Programme & accès</h3>';
    h += '<div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;align-items:center;margin-bottom:var(--space-md);">';
    h += '<span style="font-size:var(--text-sm);font-weight:600;">Programme actuel :</span> <span class="badge badge--active">' + esc(cl.programName) + '</span>';
    if (cl.program === 'reset21' && cl.status === 'active') {
      h += ' <button class="btn btn--primary btn--sm" id="upgrade-btn">↑ Upgrade vers Évolution</button>';
    }
    h += '</div>';
    if (cl.status === 'active' || cl.status === 'expired') {
      h += '<div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;align-items:center;margin-bottom:var(--space-md);">';
      h += '<span style="font-size:var(--text-sm);font-weight:600;">Accès jusqu\'au :</span> <span style="font-size:var(--text-sm);">' + formatDate(cl.endDate) + '</span>';
      h += ' <input type="number" id="extend-days" value="30" min="1" max="365" style="width:60px;padding:4px 8px;border:1px solid var(--color-border);border-radius:var(--radius-sm);font-size:var(--text-sm);text-align:center;">';
      h += ' <button class="btn btn--outline btn--sm" id="extend-btn">+ Prolonger</button>';
      h += '</div>';
    }
    // Nouveau programme
    if (cl.status === 'expired' || cl.status === 'active') {
      h += '<div style="display:flex;gap:var(--space-sm);flex-wrap:wrap;align-items:center;margin-bottom:var(--space-md);">';
      h += '<span style="font-size:var(--text-sm);font-weight:600;">Démarrer un nouveau programme :</span>';
      h += '<select id="new-program-select" class="form__input" style="width:auto;padding:4px 10px;font-size:var(--text-sm);">';
      h += '<option value="reset21">Sublime Reset 21 (21j)</option>';
      h += '<option value="evolution">Sublime Evolution (90j)</option>';
      h += '</select>';
      h += '<button class="btn btn--primary btn--sm" id="new-program-btn">Démarrer</button>';
      h += '</div>';
    }
    // Historique programmes
    var history = cl.programHistory || [];
    if (history.length) {
      h += '<div style="margin-top:var(--space-sm);">';
      h += '<span style="font-size:var(--text-sm);font-weight:600;display:block;margin-bottom:var(--space-xs);">Historique des programmes</span>';
      history.forEach(function(p) {
        h += '<div style="display:flex;gap:var(--space-sm);align-items:center;padding:6px 0;border-bottom:1px solid var(--color-border-light);font-size:var(--text-sm);">';
        h += '<span class="badge badge--' + (p.status === 'completed' ? 'active' : 'expired') + '" style="font-size:9px;">' + (p.status === 'completed' ? 'Terminé' : 'Expiré') + '</span>';
        h += '<span>' + esc(p.programName) + '</span>';
        h += '<span style="color:var(--color-text-muted);">' + formatDate(p.startDate) + ' → ' + formatDate(p.endDate) + '</span>';
        h += '</div>';
      });
      h += '</div>';
    }
    h += '</div>';

    // ── Options actives ──
    var opts = cl.options || {};
    h += '<div class="card" style="margin-bottom:var(--space-lg);padding:var(--space-lg);">';
    h += '<h3 style="margin-bottom:var(--space-md);">Options</h3>';
    var toggleOpts = [
      { key: 'tracker', label: 'Tracker bien-être', desc: 'Suivi quotidien humeur, énergie, alimentation' },
      { key: 'recettesPerso', label: 'Recettes personnalisées', desc: 'Menus et recettes adaptés aux goûts de la cliente' }
    ];
    toggleOpts.forEach(function(opt) {
      var isOn = opts[opt.key] || false;
      h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-sm) 0;border-bottom:1px solid var(--color-border-light);">';
      h += '<div><strong style="font-size:var(--text-sm);">' + opt.label + '</strong><br><span style="font-size:var(--text-xs);color:var(--color-text-muted);">' + opt.desc + '</span></div>';
      h += '<button class="btn btn--sm toggle-option-btn" data-option="' + opt.key + '" style="' + (isOn ? 'background:var(--color-accent);color:#fff;border-color:var(--color-accent);' : '') + '">' + (isOn ? '✓ Activé' : 'Activer') + '</button>';
      h += '</div>';
    });
    h += '</div>';

    // ── Paniers bien-être (liste de produits avec liens) ──
    var paniers = cl.paniers || [];
    h += '<div class="card" style="margin-bottom:var(--space-lg);padding:var(--space-lg);">';
    h += '<h3 style="margin-bottom:var(--space-md);">Paniers bien-être</h3>';
    if (paniers.length) {
      paniers.forEach(function(p, i) {
        h += '<div style="display:flex;gap:var(--space-sm);align-items:center;padding:var(--space-xs) 0;border-bottom:1px solid var(--color-border-light);flex-wrap:wrap;">';
        h += '<span style="font-size:var(--text-sm);font-weight:600;min-width:120px;">' + esc(p.name) + '</span>';
        h += '<a href="' + esc(p.url) + '" target="_blank" rel="noopener" style="font-size:var(--text-xs);color:var(--color-accent);word-break:break-all;flex:1;">' + esc(p.url) + '</a>';
        h += '<button class="btn btn--sm edit-panier-btn" data-index="' + i + '" style="font-size:var(--text-xs);">Modifier</button>';
        h += '<button class="btn btn--sm remove-panier-btn" data-index="' + i + '" style="font-size:var(--text-xs);color:#c44;border-color:#c44;">×</button>';
        h += '</div>';
      });
    } else {
      h += '<p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-sm);">Aucun produit ajouté.</p>';
    }
    h += '<div style="margin-top:var(--space-sm);display:flex;gap:var(--space-xs);flex-wrap:wrap;align-items:flex-end;">';
    h += '<div style="flex:1;min-width:120px;"><label style="font-size:var(--text-xs);color:var(--color-text-muted);">Nom du produit</label><input type="text" id="panier-name" class="form__input" style="padding:6px 10px;font-size:var(--text-sm);" placeholder="Ex: Beauty Focus Collagène"></div>';
    h += '<div style="flex:2;min-width:200px;"><label style="font-size:var(--text-xs);color:var(--color-text-muted);">URL boutique</label><input type="url" id="panier-url" class="form__input" style="padding:6px 10px;font-size:var(--text-sm);" placeholder="https://..."></div>';
    h += '<button class="btn btn--primary btn--sm" id="add-panier-btn">Ajouter</button>';
    h += '</div>';
    h += '</div>';

    // ── E-books ──
    var ebooksOwned = cl.ebooks || [];
    var allEbooks = (typeof CONFIG !== 'undefined' && CONFIG.ebooks) ? CONFIG.ebooks : [
      { id: 'eb1', title: 'Ménopause & perte de poids' },
      { id: 'eb2', title: 'Stress & alimentation' },
      { id: 'eb3', title: 'Detox douce & IG Bas' }
    ];
    h += '<div class="card" style="margin-bottom:var(--space-lg);padding:var(--space-lg);">';
    h += '<h3 style="margin-bottom:var(--space-md);">E-books</h3>';
    allEbooks.forEach(function(eb) {
      var owned = ebooksOwned.indexOf(eb.title) !== -1;
      h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-xs) 0;border-bottom:1px solid var(--color-border-light);">';
      h += '<span style="font-size:var(--text-sm);">' + esc(eb.title) + '</span>';
      h += '<button class="btn btn--sm toggle-ebook-btn" data-ebook="' + esc(eb.title) + '" style="' + (owned ? 'background:var(--color-accent);color:#fff;border-color:var(--color-accent);' : '') + '">' + (owned ? '✓ Acheté' : 'Marquer acheté') + '</button>';
      h += '</div>';
    });
    h += '</div>';

    // Add note
    h += '<div class="note-form">';
    h += '<h3 style="margin-bottom:var(--space-sm);">Ajouter un compte-rendu</h3>';
    h += '<textarea class="form__textarea" id="note-textarea" placeholder="Écris ton compte-rendu de séance ici..." style="min-height:100px;">' + esc(state.noteText) + '</textarea>';
    h += '<button class="btn btn--primary btn--sm" id="add-note-btn" style="margin-top:var(--space-sm);">Enregistrer la note</button>';
    h += '</div>';

    // Coach notes
    if (cl.coachNotes && cl.coachNotes.length) {
      h += '<h3 style="margin-bottom:var(--space-sm);">Notes & comptes-rendus</h3>';
      cl.coachNotes.forEach(function(n) {
        h += '<div class="coach-note"><div class="coach-note__date">' + formatDate(n.date) + '</div><p>' + esc(n.text) + '</p></div>';
      });
    }

    // Tracker
    if (cl.tracker && cl.tracker.length) {
      h += '<h3 style="margin:var(--space-lg) 0 var(--space-sm);">Historique tracker</h3>';
      cl.tracker.forEach(function(e, idx) {
        h += '<div class="card" style="margin-bottom:var(--space-sm);padding:var(--space-md);">';
        h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-xs);">';
        h += '<strong style="font-size:var(--text-sm);">' + formatDate(e.date) + '</strong>';
        h += '<span>' + (moods[e.humeur] || '') + ' ' + (respects[e.respect] || '') + '</span>';
        h += '</div>';
        h += '<div style="font-size:var(--text-xs);color:var(--color-text-light);display:flex;gap:var(--space-md);flex-wrap:wrap;margin-bottom:var(--space-xs);">';
        h += '<span>Fringales : ' + esc(e.fringales || '—') + '</span>';
        h += '<span>Activité : ' + esc(e.activite || '—') + '</span>';
        h += '<span>Moment soi : ' + esc(e.moment_soi || '—') + '</span>';
        h += '<span>Difficulté : ' + esc(e.difficulte || '—') + '</span>';
        h += '</div>';
        if (e.notes) h += '<p style="font-size:var(--text-sm);color:var(--color-text);margin-bottom:var(--space-xs);font-style:italic;">"' + esc(e.notes) + '"</p>';
        // Coach comment on this entry
        if (e.coachComment) {
          h += '<div style="background:var(--color-bg-warm);border-left:3px solid var(--color-accent);padding:8px 12px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-top:var(--space-xs);">';
          h += '<span style="font-size:var(--text-xs);color:var(--color-accent);font-weight:600;">Sandra :</span> ';
          h += '<span style="font-size:var(--text-sm);">' + esc(e.coachComment) + '</span></div>';
        } else {
          h += '<div style="display:flex;gap:var(--space-xs);margin-top:var(--space-xs);">';
          h += '<input type="text" class="form__input tracker-comment-input" data-idx="' + idx + '" placeholder="Ajouter un commentaire..." style="padding:4px 8px;font-size:var(--text-xs);flex:1;">';
          h += '<button class="btn btn--outline btn--sm tracker-comment-btn" data-idx="' + idx + '" style="font-size:var(--text-xs);padding:4px 12px;">Envoyer</button>';
          h += '</div>';
        }
        h += '</div>';
      });
    } else {
      h += '<p style="color:var(--color-text-muted);margin-top:var(--space-lg);">Aucune entrée tracker pour le moment.</p>';
    }

    h += '</div>';
    return h;
  }

  /* ═══ EVENTS ═══ */
  function bindEvents() {
    // Search
    var searchInput = document.getElementById('search-input');
    if (searchInput) {
      searchInput.addEventListener('input', function() { state.search = this.value; render(); });
      searchInput.focus();
      searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
    }

    // Filter by programme
    var filterProg = document.getElementById('filter-program');
    if (filterProg) filterProg.addEventListener('change', function() { state.filterProgram = this.value; render(); });

    // Filter by status (stat cards)
    document.querySelectorAll('.stat-filter').forEach(function(card) {
      card.addEventListener('click', function() {
        var s = this.dataset.filterStatus;
        state.filterStatus = (state.filterStatus === s && s !== 'all') ? 'all' : s;
        render();
      });
    });

    // Clear filters
    var clearBtn = document.getElementById('clear-filters-btn');
    if (clearBtn) clearBtn.addEventListener('click', function() {
      state.search = ''; state.filterStatus = 'all'; state.filterProgram = 'all';
      render();
    });

    // Row click → detail
    document.querySelectorAll('.client-table tr[data-token]').forEach(function(row) {
      row.addEventListener('click', function() {
        var token = this.dataset.token;
        var cl = state.clients.find(function(c) { return c.token === token || c.email === token; });
        if (cl) { state.selectedToken = cl.token || cl.email; }
        state.view = 'detail';
        state.noteText = '';
        render();
        window.scrollTo(0, 0);
      });
    });

    // Back button
    var backBtn = document.getElementById('back-btn');
    if (backBtn) backBtn.addEventListener('click', function() { state.view = 'list'; render(); });

    // Upgrade programme
    var upgradeBtn = document.getElementById('upgrade-btn');
    if (upgradeBtn) upgradeBtn.addEventListener('click', function() {
      var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
      if (!cl) return;
      cl.program = 'evolution';
      cl.programName = 'Sublime Evolution';
      var end = new Date(cl.startDate);
      end.setDate(end.getDate() + 90);
      cl.endDate = end.toISOString().slice(0, 10);
      cl.options.tracker = true;
      cl.options.recettesPerso = true;
      showToast('Upgrade vers Évolution ! Toutes les options activées.');
      render();
    });

    // Prolonger accès (jours variables)
    var extendBtn = document.getElementById('extend-btn');
    if (extendBtn) extendBtn.addEventListener('click', function() {
      var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
      if (!cl) return;
      var daysInput = document.getElementById('extend-days');
      var days = parseInt(daysInput ? daysInput.value : 30) || 30;
      var end = cl.endDate ? new Date(cl.endDate) : new Date();
      end.setDate(end.getDate() + days);
      cl.endDate = end.toISOString().slice(0, 10);
      if (cl.status === 'expired') cl.status = 'active';
      showToast('Accès prolongé de ' + days + ' jours !');
      render();
    });

    // New program
    var newProgBtn = document.getElementById('new-program-btn');
    if (newProgBtn) newProgBtn.addEventListener('click', function() {
      var cl = state.clients.find(function(c) { return c.token === state.selectedToken || c.email === state.selectedToken; });
      if (!cl) return;
      var select = document.getElementById('new-program-select');
      var newProg = select ? select.value : 'reset21';
      var progNames = { reset21: 'Sublime Reset 21', evolution: 'Sublime Evolution' };
      var durations = { reset21: 21, evolution: 90 };
      // Archive current program
      if (cl.program && cl.startDate) {
        if (!cl.programHistory) cl.programHistory = [];
        cl.programHistory.unshift({
          program: cl.program,
          programName: cl.programName,
          startDate: cl.startDate,
          endDate: cl.endDate,
          status: cl.status === 'active' ? 'completed' : cl.status
        });
      }
      // Set new program
      cl.program = newProg;
      cl.programName = progNames[newProg];
      cl.startDate = new Date().toISOString().slice(0, 10);
      var end = new Date();
      end.setDate(end.getDate() + durations[newProg]);
      cl.endDate = end.toISOString().slice(0, 10);
      cl.status = 'active';
      if (newProg === 'evolution') { cl.options.tracker = true; cl.options.recettesPerso = true; }
      showToast('Nouveau programme ' + progNames[newProg] + ' démarré !');
      render();
    });

    // Toggle options
    document.querySelectorAll('.toggle-option-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
        if (!cl) return;
        var key = this.dataset.option;
        cl.options[key] = !cl.options[key];
        showToast(cl.options[key] ? 'Option activée !' : 'Option désactivée');
        render();
      });
    });

    // Toggle ebooks
    document.querySelectorAll('.toggle-ebook-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
        if (!cl) return;
        var title = this.dataset.ebook;
        var idx = cl.ebooks.indexOf(title);
        if (idx === -1) { cl.ebooks.push(title); showToast('E-book marqué comme acheté'); }
        else { cl.ebooks.splice(idx, 1); showToast('E-book retiré'); }
        render();
      });
    });

    // Copy link
    var copyBtn = document.getElementById('copy-link-btn');
    if (copyBtn) copyBtn.addEventListener('click', function() {
      var link = this.dataset.link;
      navigator.clipboard.writeText(link).then(function() { showToast('Lien copié !'); });
    });

    // Activate access
    var activateBtn = document.getElementById('activate-btn');
    if (activateBtn) activateBtn.addEventListener('click', function() {
      var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
      if (!cl) return;

      if (!CONFIG.WEBHOOK_ADMIN_ACTIVATE) {
        // Mock: generate token, set status active, set dates
        cl.token = 'tok-' + Math.random().toString(36).substr(2, 12);
        cl.status = 'active';
        cl.startDate = new Date().toISOString().slice(0, 10);
        var end = new Date();
        end.setDate(end.getDate() + (cl.program === 'reset21' ? 21 : 90));
        cl.endDate = end.toISOString().slice(0, 10);
        state.selectedToken = cl.token;
        showToast('Accès activé pour ' + cl.firstName + ' ! (mock)');
        render();
        return;
      }

      fetch(CONFIG.WEBHOOK_ADMIN_ACTIVATE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: cl.email, program: cl.program })
      }).then(function(r) { return r.json(); })
        .then(function(data) {
          cl.token = data.token;
          cl.status = 'active';
          cl.startDate = data.startDate;
          cl.endDate = data.endDate;
          state.selectedToken = cl.token;
          showToast('Accès activé et email envoyé !');
          render();
        }).catch(function() { showToast('Erreur — réessaie'); });
    });

    // Paniers — add
    var addPanierBtn = document.getElementById('add-panier-btn');
    if (addPanierBtn) addPanierBtn.addEventListener('click', function() {
      var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
      if (!cl) return;
      var nameEl = document.getElementById('panier-name');
      var urlEl = document.getElementById('panier-url');
      if (!nameEl.value.trim()) { showToast('Nom du produit requis'); return; }
      if (!cl.paniers) cl.paniers = [];
      cl.paniers.push({ name: nameEl.value.trim(), url: urlEl.value.trim() || '#' });
      showToast('Produit ajouté !');
      render();
    });

    // Paniers — remove
    document.querySelectorAll('.remove-panier-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
        if (!cl) return;
        cl.paniers.splice(parseInt(this.dataset.index), 1);
        showToast('Produit retiré');
        render();
      });
    });

    // Paniers — edit
    document.querySelectorAll('.edit-panier-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
        if (!cl) return;
        var idx = parseInt(this.dataset.index);
        var p = cl.paniers[idx];
        var newUrl = prompt('Nouvelle URL pour ' + p.name + ' :', p.url);
        if (newUrl !== null) {
          p.url = newUrl;
          showToast('URL mise à jour');
          render();
        }
      });
    });

    // Tracker — coach comment
    document.querySelectorAll('.tracker-comment-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
        if (!cl) return;
        var idx = parseInt(this.dataset.idx);
        var input = document.querySelector('.tracker-comment-input[data-idx="' + idx + '"]');
        if (!input || !input.value.trim()) { showToast('Écris un commentaire'); return; }
        cl.tracker[idx].coachComment = input.value.trim();
        showToast('Commentaire ajouté !');
        render();
      });
    });

    // Note textarea
    var noteArea = document.getElementById('note-textarea');
    if (noteArea) noteArea.addEventListener('input', function() { state.noteText = this.value; });

    // Add note
    var addNoteBtn = document.getElementById('add-note-btn');
    if (addNoteBtn) addNoteBtn.addEventListener('click', function() {
      if (!state.noteText.trim()) { showToast('Écris quelque chose avant d\'enregistrer'); return; }
      var cl = state.clients.find(function(c) { return c.token === state.selectedToken; });
      if (!cl) return;

      var note = { date: new Date().toISOString().slice(0, 10), text: state.noteText.trim() };

      if (!CONFIG.WEBHOOK_ADMIN_NOTE) {
        cl.coachNotes.unshift(note);
        state.noteText = '';
        showToast('Note enregistrée !');
        render();
        return;
      }

      fetch(CONFIG.WEBHOOK_ADMIN_NOTE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: cl.token, text: note.text })
      }).then(function(r) { return r.json(); })
        .then(function() { cl.coachNotes.unshift(note); state.noteText = ''; showToast('Note enregistrée !'); render(); })
        .catch(function() { showToast('Erreur — réessaie'); });
    });
  }

  /* ═══ INIT ═══ */
  loadData();
})();
</script>
</body>
</html>
