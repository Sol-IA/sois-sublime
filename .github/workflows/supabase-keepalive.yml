name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 10 */2 * *'   # toutes les 48h à 10h UTC
  workflow_dispatch:           # déclenchement manuel depuis GitHub si besoin

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://mhypseqesbbafttyntds.supabase.co/rest/v1/documents?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}")
          echo "Supabase status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Erreur ping Supabase : HTTP $STATUS"
            exit 1
          fi
