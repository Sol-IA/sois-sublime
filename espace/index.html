<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Espace — Sois Sublime</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="32x32" href="../assets-sandra/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="espace">

<div id="app"></div>
<div class="toast" id="toast"></div>

<script src="../config.js"></script>
<script>
(function() {
  'use strict';

  /* ═══ PROGRAM HIERARCHY (for access control) ═══ */
  var PROG_LEVEL = { reset21: 1, evolution: 2, sublimetoi: 3 };

  function hasAccess(clientProgram, requiredProgram) {
    return (PROG_LEVEL[clientProgram] || 0) >= (PROG_LEVEL[requiredProgram] || 0);
  }

  /* ═══ MOCK DATA ═══ */
  var MOCK_DATA = {
    client: { firstName: 'Marie', lastName: 'Dupont', email: 'marie@example.com', needsVerification: false },
    program: { id: 'evolution', name: 'Sublime Evolution', startDate: '2026-03-15', endDate: '2026-06-15', expired: false, durationDays: 90 },
    programHistory: [
      { name: 'Sublime Reset 21', startDate: '2025-12-01', endDate: '2025-12-22', status: 'completed' }
    ],
    paniers: [
      { name: 'Beauty Focus Collagene', url: 'https://www.nuskin.com/content/nuskin/fr_FR/products/beauty-focus-collagen.html' },
      { name: 'LumiSpa', url: 'https://www.nuskin.com/content/nuskin/fr_FR/products/ageloc-lumispa.html' },
      { name: 'Tegreen', url: 'https://www.nuskin.com/content/nuskin/fr_FR/products/pharmanex/tegreen97.html' }
    ],
    tracker: {
      entries: [
        { date: '2026-04-11', fringales: 'non', activite: 'sport', respect: 'oui', humeur: 'forme', moment_soi: 'oui', difficulte: 'non', notes: '', coachComment: 'Bravo Marie, 3 seances de sport cette semaine ! Continue.' },
        { date: '2026-04-10', fringales: 'un_peu', activite: 'marche', respect: 'a_peu_pres', humeur: 'stable', moment_soi: 'un_peu', difficulte: 'non', notes: 'Journee chargee', coachComment: '' },
        { date: '2026-04-09', fringales: 'non', activite: 'sport', respect: 'oui', humeur: 'forme', moment_soi: 'oui', difficulte: 'non', notes: 'Super seance !', coachComment: 'Top ! Tu prends le rythme.' },
        { date: '2026-04-08', fringales: 'non', activite: 'non', respect: 'oui', humeur: 'stable', moment_soi: 'non', difficulte: 'non', notes: '', coachComment: '' }
      ],
      coachNotes: [
        { date: '2026-04-07', text: 'Super progres cette semaine Marie ! Tes habitudes se mettent bien en place. Continue comme ca, les resultats vont suivre.' },
        { date: '2026-03-25', text: 'On a travaille sur la composition des petits-dejeuners. Marie a bien compris le principe IG Bas.' }
      ]
    }
  };

  /* ═══ STATE ═══ */
  var state = { token: null, tab: 'methode', data: null, loading: true, error: null, recipeFilter: 'all', formDirty: false, trackerValues: {} };
  var app = document.getElementById('app');

  /* ═══ UTILS ═══ */
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function todayStr() { return new Date().toISOString().slice(0, 10); }
  function formatDate(d) { var p = d.split('-'); return p[2] + '/' + p[1] + '/' + p[0]; }
  function daysBetween(a, b) { return Math.ceil((new Date(b) - new Date(a)) / 86400000); }
  function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 3000); }

  var ICO = {
    lock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
    pdf: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
    book: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
    star: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'
  };

  /* ═══ DATA LOADING ═══ */
  function loadData() {
    state.token = new URLSearchParams(window.location.search).get('t');
    if (!state.token) { state.loading = false; state.error = 'no_token'; render(); return; }
    if (!CONFIG.WEBHOOK_ESPACE) { state.data = MOCK_DATA; state.loading = false; render(); return; }
    fetch(CONFIG.WEBHOOK_ESPACE + '?t=' + encodeURIComponent(state.token))
      .then(function(r) { if (!r.ok) throw new Error('invalid'); return r.json(); })
      .then(function(data) { if (data.error) state.error = data.error; else state.data = data; state.loading = false; render(); })
      .catch(function() { state.error = 'network'; state.loading = false; render(); });
  }

  /* ═══ RENDER ═══ */
  function render() {
    if (state.loading) { app.innerHTML = renderMsg('&#x1F98B;', 'Chargement...', 'Un instant, on prepare ton espace.'); return; }
    if (state.error) {
      var m = { no_token: ['&#x1F512;', 'Acces reserve', 'Cet espace est reserve aux clientes Sois Sublime.'], invalid_token: ['&#x274C;', 'Lien invalide', 'Ce lien n\'est plus valide.'], network: ['&#x26A0;', 'Erreur', 'Impossible de charger tes donnees.'] };
      var e = m[state.error] || m.network;
      app.innerHTML = renderMsg(e[0], e[1], e[2]); return;
    }
    var pid = state.data.program.id;
    var h = renderHeader() + renderTabs() + '<div class="espace-content">';
    switch (state.tab) {
      case 'methode': h += renderDocs('Ma Methode IG Bas', 'Les fiches fondamentales de la methode.', CONFIG.methode); break;
      case 'fiches': h += renderDocs('Fiches Pratiques', 'Des conseils concrets pour appliquer la methode au quotidien.', CONFIG.fichesPratiques); break;
      case 'essentiels': h += renderDocs('Les Essentiels', 'Tes outils du quotidien : listes de courses, composition d\'assiettes, objectifs.', CONFIG.essentiels); break;
      case 'recettes': h += renderRecettes(); break;
      case 'tracker': h += renderTracker(); break;
      case 'suivi': h += renderSuivi(); break;
      case 'produits': h += renderProduits(); break;
      case 'ebooks': h += renderEbooks(); break;
    }
    // Upsell Evolution pour Reset 21
    if (pid === 'reset21' && state.tab !== 'ebooks' && state.tab !== 'produits') {
      h += renderUpsellBlock();
    }
    h += '</div>';
    // Bouton diagnostic sticky
    h += '<a class="diagnostic-sticky" href="' + CONFIG.diagnosticUrl + '" target="_blank" rel="noopener">' +
      '&#x1F4DE; Besoin d\'aide entre deux seances ? <strong>Sublime Diagnostique — ' + CONFIG.diagnosticPrice + '</strong></a>';
    app.innerHTML = h;
    bindEvents();
  }

  function renderMsg(ico, title, text) {
    return '<div class="espace-message"><div class="espace-message__icon">' + ico + '</div><h1>' + esc(title) + '</h1><p>' + esc(text) + '</p><a class="btn btn--outline" href="mailto:' + CONFIG.email + '">Contacter Sandra</a></div>';
  }

  function renderHeader() {
    var d = state.data, p = d.program;
    var elapsed = Math.min(daysBetween(p.startDate, todayStr()), p.durationDays);
    var rem = Math.max(0, p.durationDays - elapsed);
    var pct = Math.min(100, Math.round((elapsed / p.durationDays) * 100));
    return '<header class="header" style="background:var(--color-primary);border-bottom:none;">' +
      '<div class="header__inner">' +
      '<a class="header__logo" href="../index.html"><img src="../assets-sandra/logo-sandra-prune.svg" alt="Sois Sublime" width="40" height="40" style="filter:brightness(0) invert(1);"><span style="color:#fff;">Sois Sublime</span></a>' +
      '</div></header>' +
      '<div class="espace-header" style="padding-top:calc(var(--header-h) + var(--space-sm));">' +
      '<h1 style="color:#fff;">&#x1F98B; Bienvenue ' + esc(d.client.firstName) + '</h1>' +
      '<p style="font-size:var(--text-lg);color:rgba(255,255,255,.9);">' + esc(p.name) + '</p>' +
      '<p>J' + elapsed + '/' + p.durationDays + (rem > 0 ? ' &middot; ' + rem + ' jours restants' : ' &middot; Termine !') + '</p>' +
      '<div class="welcome-card__progress" style="max-width:300px;margin:var(--space-xs) auto 0;"><div class="welcome-card__progress-bar" style="width:' + pct + '%;"></div></div></div>';
  }

  function renderTabs() {
    var pid = state.data.program.id;
    var tabs = [
      { id: 'methode', label: 'Methode', ico: '&#x1F4D6;' },
      { id: 'essentiels', label: 'Essentiels', ico: '&#x1F34E;' },
      { id: 'fiches', label: 'Fiches', ico: '&#x1F4A1;' },
      { id: 'recettes', label: 'Recettes', ico: '&#x1F373;', needsEvo: true },
      { id: 'tracker', label: 'Tracker', ico: '&#x1F4CA;', needsEvo: true },
      { id: 'suivi', label: 'Suivi', ico: '&#x1F4DD;' },
      { id: 'produits', label: 'Bien-etre', ico: '&#x2728;' },
      { id: 'ebooks', label: 'E-books', ico: '&#x1F4DA;' }
    ];
    var h = '<div class="tab-bar">';
    tabs.forEach(function(t) {
      var locked = t.needsEvo && !hasAccess(pid, 'evolution');
      h += '<button class="tab-btn' + (state.tab === t.id ? ' active' : '') + (locked ? ' tab-btn--locked' : '') + '" data-tab="' + t.id + '">' +
        '<span class="tab-btn__icon">' + t.ico + '</span><span class="tab-btn__label">' + t.label + '</span>' +
        (locked ? '<span class="tab-btn__lock">' + ICO.lock + '</span>' : '') + '</button>';
    });
    return h + '</div>';
  }

  /* ═══ GENERIC DOC LIST RENDERER ═══ */
  function renderDocs(title, desc, items) {
    var pid = state.data.program.id;
    var elapsed = daysBetween(state.data.program.startDate, todayStr());
    var h = '<h2 style="margin-bottom:var(--space-xs);">' + esc(title) + '</h2>';
    h += '<p class="lead" style="margin-bottom:var(--space-lg);">' + esc(desc) + '</p>';
    items.forEach(function(item) {
      var ok = hasAccess(pid, item.minProgram);
      var dayOk = !item.dayStart || elapsed >= item.dayStart;
      if (ok && dayOk) {
        h += '<a class="content-card" href="' + encodeURI('../' + item.file) + '" target="_blank" rel="noopener">';
        h += '<div class="content-card__icon">' + ICO.pdf + '</div>';
        h += '<div class="content-card__text"><h4>' + esc(item.title) + '</h4>' + (item.desc ? '<small>' + esc(item.desc) + '</small>' : '') + '</div></a>';
      } else if (ok && !dayOk) {
        var daysLeft = item.dayStart - elapsed;
        h += '<div class="content-card content-card--locked"><div class="content-card__icon">&#x1F551;</div>';
        h += '<div class="content-card__text"><h4>' + esc(item.title) + '</h4><small>Disponible dans ' + daysLeft + ' jour' + (daysLeft > 1 ? 's' : '') + '</small></div></div>';
      } else {
        h += '<div class="content-card content-card--locked"><div class="content-card__icon">' + ICO.lock + '</div>';
        h += '<div class="content-card__text"><h4>' + esc(item.title) + '</h4><small>Disponible avec Sublime Evolution</small></div></div>';
      }
    });
    return h;
  }

  /* ═══ RECETTES ═══ */
  function renderRecettes() {
    var pid = state.data.program.id;
    var cats = [{ id: 'all', l: 'Toutes' }, { id: 'petit-dejeuner', l: 'Petit-dej' }, { id: 'repas', l: 'Repas' }, { id: 'gouter', l: 'Gouter' }, { id: 'apero', l: 'Apero' }, { id: 'autre', l: 'Autre' }];
    var h = '<h2 style="margin-bottom:var(--space-xs);">Mes Recettes IG Bas</h2>';
    h += '<p class="lead" style="margin-bottom:var(--space-md);">Des idees gourmandes et equilibrees.</p>';
    h += '<div class="filter-bar">';
    cats.forEach(function(c) { h += '<button class="filter-btn' + (state.recipeFilter === c.id ? ' active' : '') + '" data-filter="' + c.id + '">' + c.l + '</button>'; });
    h += '</div><div class="recipe-grid">';
    CONFIG.recipes.filter(function(r) { return state.recipeFilter === 'all' || r.category === state.recipeFilter; }).forEach(function(r) {
      var ok = hasAccess(pid, r.minProgram);
      if (ok) {
        h += '<a class="recipe-card" href="' + encodeURI('../' + r.file) + '" target="_blank" rel="noopener"><h4>' + esc(r.title) + '</h4><span class="recipe-card__cat">' + esc(r.category) + '</span></a>';
      } else {
        h += '<div class="recipe-card content-card--locked" style="cursor:not-allowed;"><h4>' + esc(r.title) + '</h4><span class="recipe-card__cat">' + esc(r.category) + '</span></div>';
      }
    });
    h += '</div>';
    if (!hasAccess(pid, 'evolution')) {
      h += renderUpsellBlock();
    }
    return h;
  }

  /* ═══ TRACKER ═══ */
  function renderTracker() {
    var pid = state.data.program.id;
    if (!hasAccess(pid, 'evolution')) {
      return renderLockedTab('Tracker Bien-être', 'Le tracker quotidien est inclus dans Sublime Evolution. Suis ta progression jour après jour : humeur, énergie, alimentation.');
    }
    var h = '<h2 style="margin-bottom:var(--space-md);">Mon Tracker du jour</h2><div class="tracker-form">';
    var fields = [
      { id: 'fringales', label: 'Fringales ?', opts: [['non', 'Non'], ['un_peu', 'Un peu mais gere'], ['oui', 'Oui']] },
      { id: 'activite', label: 'Activite physique ?', opts: [['sport', 'Sport'], ['marche', 'Marche / bouge'], ['non', 'Non']] },
      { id: 'respect', label: 'Respect du programme ?', opts: [['oui', 'Oui'], ['a_peu_pres', 'A peu pres'], ['non', 'Pas vraiment']] },
      { id: 'humeur', label: 'Comment tu te sens ?', opts: [['forme', 'En pleine forme'], ['stable', 'Plutot stable'], ['pas_top', 'Pas au top']] },
      { id: 'moment_soi', label: 'Moment pour toi ?', opts: [['oui', 'Oui'], ['un_peu', 'Un peu'], ['non', 'Pas du tout']] },
      { id: 'difficulte', label: 'Journee difficile ?', opts: [['non', 'Non, tout va bien'], ['moyen', 'Moyennement'], ['oui', 'Oui difficile']] }
    ];
    fields.forEach(function(f) {
      var sel = state.trackerValues[f.id] || '';
      h += '<div class="tracker-field"><label>' + f.label + '</label><div class="tracker-options">';
      f.opts.forEach(function(o) { h += '<button class="tracker-option' + (sel === o[0] ? ' selected' : '') + '" data-field="' + f.id + '" data-value="' + o[0] + '">' + o[1] + '</button>'; });
      h += '</div></div>';
    });
    h += '<div class="tracker-field"><label>Notes libres</label><textarea class="form__textarea" id="tracker-notes" placeholder="Comment s\'est passee ta journee ?" style="min-height:80px;">' + esc(state.trackerValues.notes || '') + '</textarea></div>';
    h += '<button class="btn btn--primary" id="tracker-submit" style="width:100%;">Envoyer mon suivi</button></div>';
    var entries = state.data.tracker.entries;
    if (entries && entries.length) {
      h += '<h3 style="margin:var(--space-lg) 0 var(--space-sm);">Historique</h3>';
      var moods = { forme: '&#x1F604;', stable: '&#x1F642;', pas_top: '&#x1F614;' };
      var respects = { oui: '&#x2705;', a_peu_pres: '&#x1F7E1;', non: '&#x1F534;' };
      entries.forEach(function(e) {
        h += '<div style="background:var(--color-white);border-radius:var(--radius-md);padding:var(--space-md);border:1px solid var(--color-border-light);margin-bottom:var(--space-sm);">';
        h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-xs);">';
        h += '<strong style="font-size:var(--text-sm);">' + formatDate(e.date) + '</strong>';
        h += '<span>' + (moods[e.humeur] || '') + ' ' + (respects[e.respect] || '') + '</span>';
        h += '</div>';
        h += '<div style="font-size:var(--text-xs);color:var(--color-text-light);display:flex;gap:var(--space-sm);flex-wrap:wrap;">';
        h += '<span>Fringales : ' + esc(e.fringales || '') + '</span>';
        h += '<span>Activite : ' + esc(e.activite || '') + '</span>';
        h += '</div>';
        if (e.notes) h += '<p style="font-size:var(--text-sm);font-style:italic;color:var(--color-text-light);margin:var(--space-xs) 0 0;">"' + esc(e.notes) + '"</p>';
        if (e.coachComment) {
          h += '<div style="background:var(--color-bg-warm);border-left:3px solid var(--color-accent);padding:8px 12px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-top:var(--space-xs);">';
          h += '<span style="font-size:var(--text-xs);color:var(--color-accent);font-weight:600;">Sandra :</span> ';
          h += '<span style="font-size:var(--text-sm);">' + esc(e.coachComment) + '</span></div>';
        }
        h += '</div>';
      });
    }
    return h;
  }

  /* ═══ SUIVI ═══ */
  function renderSuivi() {
    var h = '<h2 style="margin-bottom:var(--space-xs);">Mon Suivi</h2>';
    h += '<p class="lead" style="margin-bottom:var(--space-lg);">Tes comptes-rendus de seances avec Sandra.</p>';
    var notes = state.data.tracker.coachNotes;
    if (notes && notes.length) {
      notes.forEach(function(n) {
        h += '<div class="coach-note"><div class="coach-note__date">Sandra &mdash; ' + formatDate(n.date) + '</div><p>' + esc(n.text) + '</p></div>';
      });
    } else {
      h += '<div style="text-align:center;padding:var(--space-xl);color:var(--color-text-muted);">Tes comptes-rendus apparaitront ici apres tes coachings.</div>';
    }

    // Historique programmes
    var history = state.data.programHistory || [];
    if (history.length) {
      h += '<h3 style="margin:var(--space-xl) 0 var(--space-sm);">Mes anciens programmes</h3>';
      history.forEach(function(p) {
        h += '<div style="display:flex;gap:var(--space-sm);align-items:center;padding:var(--space-sm) 0;border-bottom:1px solid var(--color-border-light);font-size:var(--text-sm);">';
        h += '<span style="display:inline-block;font-size:var(--text-xs);padding:2px 8px;border-radius:var(--radius-full);background:#e8f5e9;color:#2e7d32;">' + (p.status === 'completed' ? 'Termine' : 'Expire') + '</span>';
        h += '<strong>' + esc(p.name) + '</strong>';
        h += '<span style="color:var(--color-text-muted);">' + formatDate(p.startDate) + ' → ' + formatDate(p.endDate) + '</span>';
        h += '</div>';
      });
    }

    return h;
  }

  /* ═══ PRODUITS ═══ */
  function renderProduits() {
    var h = '<h2 style="margin-bottom:var(--space-xs);">Mes Paniers Bien-etre</h2>';
    h += '<p class="lead" style="margin-bottom:var(--space-lg);">Les produits selectionnes par Sandra specialement pour toi.</p>';

    // Paniers personnalisés (ajoutés par Sandra)
    var paniers = state.data.paniers || [];
    if (paniers.length) {
      h += '<h3 style="margin-bottom:var(--space-sm);">Mes recommandations personnalisees</h3>';
      h += '<div class="grid grid--2">';
      paniers.forEach(function(p) {
        h += '<div class="product-card"><h4>' + esc(p.name) + '</h4>';
        if (p.url && p.url !== '#') h += '<a class="btn btn--primary btn--sm" href="' + esc(p.url) + '" target="_blank" rel="noopener">Voir le produit</a>';
        h += '</div>';
      });
      h += '</div>';
    }

    // Produits standards (du config.js)
    if (typeof CONFIG !== 'undefined' && CONFIG.products && CONFIG.products.length) {
      h += '<h3 style="margin:var(--space-lg) 0 var(--space-sm);">Produits recommandes</h3>';
      h += '<div class="grid grid--2">';
      CONFIG.products.forEach(function(p) {
        h += '<div class="product-card"><h4>' + esc(p.title) + '</h4>';
        h += '<p style="font-size:var(--text-sm);color:var(--color-text-light);">' + esc(p.description) + '</p>';
        if (p.shopUrl && p.shopUrl !== '#') h += '<a class="btn btn--outline btn--sm" href="' + p.shopUrl + '" target="_blank" rel="noopener">Voir le produit</a>';
        h += '</div>';
      });
      h += '</div>';
    }

    return h;
  }

  /* ═══ EBOOKS ═══ */
  function renderEbooks() {
    var h = '<h2 style="margin-bottom:var(--space-xs);">E-books Thematiques</h2>';
    h += '<p class="lead" style="margin-bottom:var(--space-lg);">Des guides approfondis pour aller plus loin dans ta transformation. Disponibles a l\'achat quel que soit ton programme.</p>';
    if (CONFIG.ebooks && CONFIG.ebooks.length) {
      CONFIG.ebooks.forEach(function(eb) {
        h += '<div class="content-card" style="cursor:default;">';
        h += '<div class="content-card__icon">' + ICO.book + '</div>';
        h += '<div class="content-card__text"><h4>' + esc(eb.title) + '</h4><small>' + esc(eb.desc) + '</small></div>';
        if (eb.available && eb.price) {
          h += '<a class="btn btn--primary btn--sm" href="#" style="flex-shrink:0;">' + eb.price + '</a>';
        } else {
          h += '<span style="flex-shrink:0;font-size:var(--text-xs);color:var(--color-text-muted);padding:6px 12px;border:1px dashed var(--color-border);border-radius:var(--radius-full);">Bientot</span>';
        }
        h += '</div>';
      });
    }
    return h;
  }

  /* ═══ UPSELL BLOCK ═══ */
  function renderUpsellBlock() {
    return '<div style="margin-top:var(--space-xl);padding:var(--space-lg);border:2px dashed var(--color-accent-light);border-radius:var(--radius-lg);background:var(--color-bg-rose);text-align:center;">' +
      '<div style="font-size:32px;margin-bottom:var(--space-sm);">' + ICO.lock + '</div>' +
      '<p style="font-size:var(--text-base);margin-bottom:var(--space-xs);"><strong>Ce contenu n\'est pas inclus dans ton programme actuel.</strong></p>' +
      '<p style="font-size:var(--text-sm);color:var(--color-text-light);margin-bottom:var(--space-md);">Avant d\'acheter, contacte Sandra — elle pourra te conseiller le contenu le plus adapté à ta situation et te proposer une réduction si tu combines plusieurs éléments.</p>' +
      '<a class="btn btn--primary" href="https://wa.me/33612452960?text=Bonjour%20Sandra%2C%20je%20souhaite%20en%20savoir%20plus%20sur%20les%20options..." target="_blank" rel="noopener">Contacter Sandra</a>' +
      '<p style="margin-top:var(--space-sm);"><a href="#" style="font-size:var(--text-xs);color:var(--color-text-muted);">Acheter directement</a></p>' +
      '</div>';
  }

  function renderLockedTab(title, desc) {
    return '<div style="text-align:center;padding:var(--space-xl) var(--space-md);">' +
      '<div style="font-size:48px;margin-bottom:var(--space-md);opacity:.3;">' + ICO.lock + '</div>' +
      '<h2 style="margin-bottom:var(--space-xs);">' + esc(title) + '</h2>' +
      '<p style="color:var(--color-text-light);max-width:450px;margin:0 auto var(--space-md);">' + esc(desc) + '</p>' +
      renderUpsellBlock() +
      '</div>';
  }

  /* ═══ EVENTS ═══ */
  function bindEvents() {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.addEventListener('click', function() { state.tab = this.dataset.tab; render(); }); });
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.addEventListener('click', function() { state.recipeFilter = this.dataset.filter; render(); }); });
    document.querySelectorAll('.tracker-option').forEach(function(b) {
      b.addEventListener('click', function() {
        state.trackerValues[this.dataset.field] = this.dataset.value; state.formDirty = true;
        this.parentNode.querySelectorAll('.tracker-option').forEach(function(s) { s.classList.remove('selected'); });
        this.classList.add('selected');
      });
    });
    var n = document.getElementById('tracker-notes');
    if (n) n.addEventListener('input', function() { state.trackerValues.notes = this.value; state.formDirty = true; });
    var s = document.getElementById('tracker-submit');
    if (s) s.addEventListener('click', function() {
      var v = state.trackerValues;
      if (!v.fringales || !v.humeur) { showToast('Remplis au moins les fringales et ton humeur'); return; }
      var entry = { date: todayStr(), fringales: v.fringales, activite: v.activite || '', respect: v.respect || '', humeur: v.humeur, moment_soi: v.moment_soi || '', difficulte: v.difficulte || '', notes: v.notes || '' };
      if (!CONFIG.WEBHOOK_TRACKER) { state.data.tracker.entries.unshift(entry); state.trackerValues = {}; state.formDirty = false; showToast('Suivi enregistre !'); render(); return; }
      fetch(CONFIG.WEBHOOK_TRACKER, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: state.token, ...entry }) })
        .then(function(r) { return r.json(); }).then(function() { state.data.tracker.entries.unshift(entry); state.trackerValues = {}; state.formDirty = false; showToast('Suivi enregistre !'); render(); })
        .catch(function() { showToast('Erreur, reessaie plus tard'); });
    });
  }

  /* ═══ INIT ═══ */
  loadData();
})();
</script>
</body>
</html>
